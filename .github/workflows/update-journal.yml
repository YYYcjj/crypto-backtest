name: 每日更新交易日记

on:
  push:
    paths:
      - "update_trading_journal.py"
      - ".github/workflows/update-journal.yml"
      - ".github/workflows/deploy-journal.yml"
  schedule:
    - cron: "0 1 * * *"  # 每天 UTC 1:00 = CST 9:00
  workflow_dispatch:      # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install openpyxl requests

      - name: Run journal update
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET: ${{ secrets.OKX_API_SECRET }}
          OKX_API_PASSPHRASE: ${{ secrets.OKX_API_PASSPHRASE }}
        run: python update_trading_journal.py

      - name: Upload Excel
        uses: actions/upload-artifact@v4
        with:
          name: 交易记录
          path: results/交易记录_*.xlsx
          retention-days: 90

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: results
          publish_branch: pages
          force_orphan: true
          commit_message: "📊 更新 ${{ github.run_number }}"
