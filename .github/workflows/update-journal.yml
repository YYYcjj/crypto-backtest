name: 每日更新交易日记

on:
  push:
    paths:
      - "results/**"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Pages branch
        run: |
          ls results/
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          mkdir -p /tmp/pages
          cp results/*.xlsx /tmp/pages/ 2>/dev/null
          cp results/*.html /tmp/pages/ 2>/dev/null
          git fetch origin pages 2>/dev/null || git checkout --orphan pages
          git checkout pages 2>/dev/null || git checkout --orphan pages
          cp /tmp/pages/* .
          git add *.xlsx *.html 2>/dev/null
          git commit -m "📊 更新 $(date +%Y-%m-%d)" || echo "No changes"
          git push origin pages --force

