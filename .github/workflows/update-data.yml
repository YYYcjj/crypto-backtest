name: 每天自动更新交易数据

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - 'trigger-now.txt'

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests
      - name: 删除触发器
        run: rm -f trigger-now.txt
      - name: 调试API
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET: ${{ secrets.OKX_API_SECRET }}
          OKX_API_PASSPHRASE: ${{ secrets.OKX_API_PASSPHRASE }}
        run: python3 debug_okx.py
      - name: 拉取当月数据
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET: ${{ secrets.OKX_API_SECRET }}
          OKX_API_PASSPHRASE: ${{ secrets.OKX_API_PASSPHRASE }}
        run: python3 update_trading_journal.py $(date +%-m) || true
      - name: 生成网页数据
        working-directory: results
        run: |
          python3 << 'PYEOF'
          import json
          with open('journal_trades.json') as f:
            trades = json.load(f)
          months = {}
          for t in trades:
            m = int(t['entry_time'][5:7])
            months.setdefault(m, []).append(t)
          labels = {1:'Q1',2:'Q1',3:'Q2',4:'Q2',5:'Q3',6:'Q3',7:'Q4',8:'Q4',9:'Q5',10:'Q5',11:'Q6',12:'Q6'}
          groups = {}
          for m in range(1,13):
            g = labels[m]
            groups.setdefault(g, [])
            if m in months:
              items = []
              for t in months[m]:
                items.append(json.dumps(t, ensure_ascii=False))
              groups[g].append('ALL_DATA['+str(m)+']=['+','.join(items)+']')
          for g, lines in groups.items():
            if lines:
              content = ';'.join(lines)+';'
              with open('../docs/data_'+g+'.js','w') as f:
                f.write(content)
              print('data_'+g+'.js: '+str(len(content))+' bytes')
          total = sum(len(v) for v in months.values())
          print('Total: '+str(total)+' trades, '+str(len(months))+' months')
          PYEOF
      - name: 提交推送
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@trading.example.com"
          git add docs/data_*.js results/journal_trades.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "$(TZ='Asia/Shanghai' date '+%m/%d') auto update"
            git push
          fi
