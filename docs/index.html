<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>交易日记</title>
<link rel="stylesheet" href="style.css?v=2">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head><body>
<div class="nav"><span>📊 交易日记</span><a href="https://github.com/YYYcjj/crypto-backtest/actions" style="margin-left:auto;color:#c7d2fe;font-size:12px">⚡自动更新</a></div><div class="container"></div>
<script>
var ALL_DATA={},M=0,cd=[],cs=[],D=[],chartRefs={};
function initPage(){
var months=Object.keys(ALL_DATA).map(Number).filter(function(m){return ALL_DATA[m]&&ALL_DATA[m].length});
if(!months.length){document.querySelector('.container').innerHTML='<div style="padding:60px;text-align:center;color:var(--muted)"><h2>📊 数据加载中...</h2><p>如长时间空白请刷新页面</p></div>';return}
months.sort(function(a,b){return a-b});
var maxM=months[months.length-1],ctr=document.querySelector('.container');
ctr.innerHTML='<h1 id="hdTitle">'+maxM+'月交易记录</h1><div class="mtabs" id="hdTabs"></div><div class="sub" id="hdSub"></div><div class="stats" id="hdStats"></div><div class="sec"><span class="line"></span><span>图表分析</span><span class="line"></span></div><div class="charts"><div class="cbox"><h3>累计盈亏走势</h3><div class="cwrap"><canvas id="ch0"></canvas></div></div><div class="cbox"><h3>品种盈亏分布</h3><div class="cwrap"><canvas id="ch1"></canvas></div></div><div class="cbox"><h3>胜率分布</h3><div class="cwrap"><canvas id="ch2"></canvas></div></div><div class="cbox"><h3>日盈亏明细</h3><div class="cwrap"><canvas id="ch3"></canvas></div></div></div><div class="sec"><span class="line"></span><span>交易明细</span><span class="line"></span></div><div class="toolbar"><label>日期</label><input type="date" id="df" onchange="R()"><span style="color:var(--muted)">-</span><input type="date" id="dt" onchange="R()"><label>搜索</label><input type="text" id="sq" placeholder="币种..." oninput="R()"><label>方向</label><select id="sd" onchange="R()"><option value="all">全部</option><option value="做多">做多</option><option value="做空">做空</option></select><label>结果</label><select id="sr" onchange="R()"><option value="all">全部</option><option value="win">盈利</option><option value="lose">亏损</option></select><span class="cnt" id="rc"></span></div><div class="twrap"><table class="mt"><colgroup><col style="width:10%"><col style="width:11%"><col style="width:6%"><col style="width:11%"><col style="width:12%"><col style="width:9%"><col style="width:9%"><col style="width:9%"><col style="width:10%"><col style="width:13%"></colgroup><thead><tr><th>日期</th><th>币种</th><th>方向</th><th>趋势</th><th>SRSI</th><th>持仓亏损</th><th>持仓盈利</th><th>结果</th><th>离场亏损</th><th>离场盈利</th></tr></thead><tbody id="tb"></tbody></table></div>';
months.forEach(function(m){var b=document.createElement('button');b.className='mtab'+(m===maxM?' act':'');b.textContent=m+'月';b.id='mt'+m;b.onclick=function(){switchMonth(m)};document.getElementById('hdTabs').appendChild(b)});
switchMonth(maxM)}
function switchMonth(m){if(m===M)return;M=m;document.querySelectorAll('.mtab').forEach(function(b){b.classList.toggle('act',parseInt(b.textContent)===m)});document.getElementById('hdTitle').textContent=m+'月交易记录';D=ALL_DATA[m]||[];if(!D.length)return;for(var di=0;di<D.length;di++)D[di]._oi=di;D.reverse();var wins=D.filter(function(t){return t.pnl_usdt>0}),losses=D.filter(function(t){return t.pnl_usdt<=0});var total=D.length,totalPnl=D.reduce(function(s,t){return s+t.pnl_usdt},0);var wr=wins.length/total*100,avgWin=wins.length?wins.reduce(function(s,t){return s+t.pnl_pct},0)/wins.length:0,avgLoss=losses.length?losses.reduce(function(s,t){return s+t.pnl_pct},0)/losses.length:0,ratio=avgLoss?Math.abs(avgWin/avgLoss):0;var uniqDays=new Set(D.map(function(t){return t.entry_time.substr(0,10)}));document.getElementById('hdSub').innerHTML='<span>OKX 永续合约</span><span>'+total+' 笔交易</span><span>胜 <b>'+wins.length+'</b>/负 <b>'+losses.length+'</b></span><span>净盈亏 <b class="'+(totalPnl<0?'down':'up')+'">'+totalPnl.toFixed(1)+'U</b></span>';document.getElementById('hdStats').innerHTML='<div class="scard info"><div class="sl">交易天数</div><div class="sv">'+uniqDays.size+'</div></div><div class="scard '+(wr>=50?'win':'lose')+'"><div class="sl">胜率</div><div class="sv '+(wr>=50?'up':'down')+'">'+wr.toFixed(0)+'%</div></div><div class="scard '+(totalPnl>=0?'win':'lose')+'"><div class="sl">净盈亏</div><div class="sv '+(totalPnl>=0?'up':'down')+'">'+totalPnl.toFixed(1)+'U</div></div><div class="scard lose"><div class="sl">平均亏损</div><div class="sv down">'+Math.abs(avgLoss).toFixed(1)+'%</div></div><div class="scard win"><div class="sl">平均盈利</div><div class="sv up">+'+avgWin.toFixed(1)+'%</div></div><div class="scard win"><div class="sl">盈亏比</div><div class="sv up">'+ratio.toFixed(2)+'</div></div>';var daily={};D.forEach(function(t){var day=t.entry_time.substr(0,10);daily[day]=(daily[day]||0)+t.pnl_usdt});cd=[];var cum=0;for(var d=1;d<=31;d++){var key='2026-'+('0'+M).slice(-2)+'-'+('0'+d).slice(-2),p=Math.round((daily[key]||0)*10)/10;cum=Math.round((cum+p)*10)/10;cd.push({d:('0'+M).slice(-2)+'-'+('0'+d).slice(-2),p:p,c:cum})}var cs2={};D.forEach(function(t){var c=t.coin.replace('-USDT','');if(!cs2[c])cs2[c]={n:c,p:0,c:0};cs2[c].p+=t.pnl_usdt;cs2[c].c++});cs=Object.values(cs2);cs.sort(function(a,b){return b.p-a.p});buildCharts();R()}
function R(){var q=document.getElementById('sq').value.toLowerCase(),dir=document.getElementById('sd').value,res=document.getElementById('sr').value,df=document.getElementById('df').value,dt2=document.getElementById('dt').value,f=[];for(var i=0;i<D.length;i++){var t=D[i];if(df&&t.entry_time<df+' 00:00')continue;if(dt2&&t.entry_time>dt2+' 23:59')continue;if(q&&t.coin.toLowerCase().indexOf(q)<0)continue;if(dir!=='all'&&t.direction!==dir)continue;if(res==='win'&&t.pnl_usdt<=0)continue;if(res==='lose'&&t.pnl_usdt>=0)continue;f.push({idx:i,trade:t})}document.getElementById('rc').textContent='显示 '+f.length+'/'+D.length+' 笔';var tb=document.getElementById('tb');tb.innerHTML='';for(var j=0;j<f.length;j++){var t=f[j].trade,row=document.createElement('tr');row.className='cl'+(t.pnl_usdt>0?' w':' l');row.innerHTML='<td>'+t.entry_time.substr(5,11)+'</td><td><b>'+t.coin+'</b></td><td><span class=badge '+(t.direction==='做多'?'bl':'bs')+'>'+t.direction+'</span></td><td>'+(t.trend_1h||'?')+'/'+(t.trend_4h||'?')+'/'+(t.trend_1d||'?')+'</td><td>'+(t.srsi_1h||'?')+'/'+(t.srsi_4h||'?')+'/'+(t.srsi_1d||'?')+'</td><td class=r>'+((t.mae_pct||0).toFixed(1)==='0.0'?'—':(t.mae_pct||0).toFixed(1)+'%')+'</td><td class=g>'+((t.mfe_pct||0).toFixed(1)==='0.0'?'—':'+'+(t.mfe_pct||0).toFixed(1)+'%')+'</td><td class='+(t.pnl_usdt>0?'g':'r')+'><b>'+(t.pnl_usdt>0?'盈':'亏')+' '+((t.pnl_usdt>0?'+':'')+t.pnl_usdt.toFixed(2)+'U')+'</b></td><td>'+((t.exit_time||'').substr(5,11)||'-')+'</td><td class='+((t.pnl_pct||0)>0?'g':'r')+'>'+((t.pnl_pct||0)>0?'+'+(t.pnl_pct||0).toFixed(1)+'%':(t.pnl_pct||0).toFixed(1)+'%')+'</td>';tb.appendChild(row)}}
function buildCharts(){Object.values(chartRefs).forEach(function(c){try{c.destroy()}catch(e){}});chartRefs.ch0=new Chart(document.getElementById('ch0'),{type:'line',data:{labels:cd.map(function(x){return x.d}),datasets:[{data:cd.map(function(x){return x.c}),borderColor:'#6366f1',backgroundColor:function(ctx){var g=ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height);g.addColorStop(0,'rgba(99,102,241,.15)');g.addColorStop(1,'rgba(99,102,241,0)');return g},fill:true,tension:.4,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});chartRefs.ch1=new Chart(document.getElementById('ch1'),{type:'bar',data:{labels:cs.map(function(c){return c.n}),datasets:[{data:cs.map(function(c){return c.p}),backgroundColor:cs.map(function(c){return c.p>0?'rgba(16,185,129,.7)':'rgba(239,68,68,.6)'}),borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false}});var wcount=D.filter(function(t){return t.pnl_usdt>0}).length,lcount=D.length-wcount;chartRefs.ch2=new Chart(document.getElementById('ch2'),{type:'doughnut',data:{labels:['盈利','亏损'],datasets:[{data:[wcount,lcount],backgroundColor:['#10b981','#ef4444'],borderColor:'#fff',borderWidth:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%'}});chartRefs.ch3=new Chart(document.getElementById('ch3'),{type:'bar',data:{labels:cd.map(function(x){return x.d}),datasets:[{data:cd.map(function(x){return x.p}),backgroundColor:cd.map(function(x){return x.p>0?'rgba(16,185,129,.65)':'rgba(239,68,68,.55)'}),borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false}})}}
var _d=atob("...COMPRESSED_DATA_HERE...");fetch("data:application/octet-stream;base64,"+_d).then(function(r){return r.arrayBuffer()}).then(function(b){var s=new DecompressionStream("deflate");var w=s.writable.getWriter();w.write(new Uint8Array(b));w.close();return new Response(s.readable).text()}).then(function(t){eval(t);if(typeof Chart!=='undefined')initPage();else document.addEventListener('DOMContentLoaded',initPage)});
</script></body></html>
