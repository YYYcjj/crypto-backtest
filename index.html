<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>交易日记 · 6月</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f8f9fa;--card:#fff;--text:#212529;--muted:#6c757d;--green:#198754;--red:#dc3545;--blue:#0d6efd;--border:#dee2e6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:1200px;margin:0 auto}
h1{font-size:22px;margin-bottom:4px}.sub{color:var(--muted);font-size:13px;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.card .label{font-size:11px;color:var(--muted)}.card .value{font-size:24px;font-weight:700}
.green{color:var(--green)}.red{color:var(--red)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:768px){.charts{grid-template-columns:1fr}}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px}
.chart-box h3{font-size:13px;margin-bottom:8px;color:var(--muted)}
.chart-wrap{position:relative;height:240px}canvas{width:100%!important}
table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
th{background:#e9ecef;padding:8px 10px;text-align:left;font-weight:600;color:var(--muted);border-bottom:2px solid var(--blue);font-size:11px;white-space:nowrap}
td{padding:6px 10px;border-bottom:1px solid var(--border)}
tr.clickable{cursor:pointer}tr.clickable:hover td{background:#e7f1ff}
tr:nth-child(even) td{background:var(--bg)}tr:nth-child(even):hover td{background:#e7f1ff}
tr.expanded td{background:#e7f1ff!important;border-bottom:2px solid var(--blue)}
.detail-row{display:none;background:#f0f7ff}.detail-row.show{display:table-row}
.detail-row td{padding:0 10px 16px 10px}
.price-chart{height:240px;margin-top:8px}
.srsi-chart{height:120px;margin-top:0}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge-win{background:#d1e7dd;color:var(--green)}.badge-lose{background:#f8d7da;color:var(--red)}
.badge-long{background:#d1e7dd;color:var(--green)}.badge-short{background:#f8d7da;color:var(--red)}
.btn{display:inline-block;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none;margin-right:8px}
.btn-down{background:var(--green);color:#fff}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px;flex-wrap:wrap;gap:8px}
.toolbar input{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;width:200px}
.toolbar input:focus{border-color:var(--blue)}
.toolbar select{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;background:var(--card)}
.detail-info{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;margin:8px 0;color:var(--muted)}
</style>
</head>

new Chart(ctx4,{type:'bar',data:{labels:cd.map(function(x){return x.day}),datasets:[{data:cd.map(function(x){return x.pnl}),backgroundColor:cd.map(function(x){return x.pnl>0?'rgba(25,135,84,.6)':'rgba(220,53,69,.6)'}),borderWidth:1,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:12,color:'#6c757d'}},y:{ticks:{color:'#6c757d',callback:function(v){return v+'U'}}}}}});
})();


function RT(){
var q=document.getElementById('search').value.toLowerCase(),d=document.getElementById('fDir').value,r=document.getElementById('fRes').value;
var f=D.slice().reverse().filter(function(t){if(q&&!t.coin.toLowerCase().includes(q))return false;if(d!=='all'&&t.direction!==d)return false;if(r==='win'&&t.pnl_usdt<=0)return false;if(r==='lose'&&t.pnl_usdt>=0)return false;return true});
document.getElementById('rowCount').textContent=f.length+'/'+D.length+'笔';
var tb='';
f.forEach(function(t){var oi=D.indexOf(t),db=t.direction==='做多'?'badge-long':'badge-short',rb=t.pnl_usdt>0?'badge-win':'badge-lose';
tb+='<tr class="clickable" onclick="TD('+oi+',this)"><td>'+t.entry_time.substr(0,16)+'</td><td><strong>'+t.coin+'</strong></td><td><span class="badge '+db+'">'+t.direction+'</span></td><td>'+t.trend_1h+'/'+t.trend_4h+'/'+t.trend_1d+'</td><td>'+t.srsi_1h+'/'+t.srsi_4h+'/'+t.srsi_1d+'</td><td>'+t.entry_price+'</td><td>'+t.exit_price+'</td><td class="'+(t.pnl_usdt>0?'green':'red')+'">'+t.pnl_pct.toFixed(1)+'%</td><td class="red">'+(t.mae_pct||0).toFixed(1)+'%</td><td class="green">'+(t.mfe_pct||0).toFixed(1)+'%</td><td><span class="badge '+rb+'">'+(t.pnl_usdt>0?'盈利':'亏损')+'</span></td></tr><tr class="detail-row" id="dr-'+oi+'"><td colspan="11"><div id="dc-'+oi+'"></div></td></tr>';
});
document.getElementById('tbody').innerHTML=tb;
}
RT();

function TD(idx,row){
var dr=document.getElementById('dr-'+idx),io=dr.classList.contains('show');
document.querySelectorAll('.detail-row.show').forEach(function(r){r.classList.remove('show')});
document.querySelectorAll('tr.expanded').forEach(function(r){r.classList.remove('expanded')});
if(priceChart){priceChart.destroy();priceChart=null}
if(srsiChart){srsiChart.destroy();srsiChart=null}
if(io){curIdx=null;return}
row.classList.add('expanded');dr.classList.add('show');curIdx=idx;

var t=D[idx],p=PATHS[idx];
if(!p||!p.bars||!p.bars.length){document.getElementById('dc-'+idx).innerHTML='<div style="padding:20px">无数据</div>';return}

var bars=p.bars, srsi=p.srsi||[], times=p.time_labels||[], exitIdx=p.exit_idx, entryIdx=p.entry_idx||48;
var mae=p.mae_val, mfe=p.mfe_val, maeIdx=p.mae_idx, mfeIdx=p.mfe_idx;

// Build labels as time
var labels=times.map(function(t,i){return i%6===0?t:''});

var cd=document.getElementById('dc-'+idx);cd.innerHTML='';

// Info bar
var div=document.createElement('div');div.className='detail-info';
div.innerHTML='<span>持仓 <strong class="red">最大亏损: '+mae+'%</strong></span><span><strong class="green">最大盈利: '+mfe+'%</strong></span><span>离场后2天走势</span>';
cd.appendChild(div);

// === PRICE CHART (top) ===
var pcDiv=document.createElement('div');pcDiv.className='price-chart';
cd.appendChild(pcDiv);
var pcCv=document.createElement('canvas');pcDiv.appendChild(pcCv);

var maeData=Array(bars.length).fill(null);maeData[maeIdx]=mae;
var mfeData=Array(bars.length).fill(null);mfeData[mfeIdx]=mfe;

priceChart=new Chart(pcCv.getContext('2d'),{
type:'line',data:{labels:labels,datasets:[
{data:bars,borderColor:'#0d6efd',backgroundColor:'rgba(13,110,253,.08)',fill:true,tension:.2,pointRadius:0,borderWidth:2,label:'价格%'},
{data:maeData,borderColor:'#dc3545',backgroundColor:'#dc3545',pointRadius:6,pointStyle:'rectRot',showLine:false,label:'最大亏损'},
{data:mfeData,borderColor:'#198754',backgroundColor:'#198754',pointRadius:6,pointStyle:'triangle',showLine:false,label:'最大盈利'}
]},
options:{
responsive:true,maintainAspectRatio:false,
plugins:{
legend:{display:true,position:'top',labels:{boxWidth:12,font:{size:10},usePointStyle:true}},
annotation:{annotations:{
entryLine:{type:'line',xMin:entryIdx,xMax:entryIdx,borderColor:'rgba(25,135,84,.6)',borderWidth:2,borderDash:[6,3],label:{display:true,content:'入场',position:'start',backgroundColor:'rgba(25,135,84,.9)',color:'#fff',font:{size:10}}},
exitLine:{type:'line',xMin:exitIdx,xMax:exitIdx,borderColor:'rgba(108,117,125,.8)',borderWidth:2,borderDash:[3,6],label:{display:true,content:'离场',position:'start',backgroundColor:'rgba(108,117,125,.9)',color:'#fff',font:{size:10}}},
zeroLine:{type:'line',yMin:0,yMax:0,borderColor:'rgba(108,117,125,.3)',borderWidth:1,borderDash:[2,2]}
}}
},
scales:{
x:{ticks:{color:'#6c757d',maxTicksLimit:12,maxRotation:45},grid:{display:false}},
y:{ticks:{color:'#6c757d',callback:function(v){return v+'%'}},title:{display:true,text:'价格%',color:'#6c757d'}}
}
}
});

// === SRSI CHART (bottom, like TradingView) ===
var srsiDiv=document.createElement('div');srsiDiv.className='srsi-chart';
cd.appendChild(srsiDiv);
var srsiCv=document.createElement('canvas');srsiDiv.appendChild(srsiCv);

srsiChart=new Chart(srsiCv.getContext('2d'),{
type:'line',data:{labels:labels,datasets:[
{data:srsi,borderColor:'rgba(245,159,0,.7)',backgroundColor:'rgba(245,159,0,.1)',fill:true,tension:.1,pointRadius:0,borderWidth:1.5,label:'SRSI K'}
]},
options:{
responsive:true,maintainAspectRatio:false,
plugins:{legend:{display:true,position:'top',labels:{boxWidth:12,font:{size:10}}}},
scales:{
x:{ticks:{color:'#6c757d',maxTicksLimit:12,maxRotation:45},grid:{display:false}},
y:{min:0,max:100,ticks:{color:'#6c757d',stepSize:25},grid:{color:'rgba(0,0,0,.05)'}}
}
}
});

// Sync cross-hair: use same x-axis labels for both
}
</script>
</body>
</html>
